<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Job Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: white;
    }

    nav {
      background-color: white;
      color: black;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      width: 50px;
      height: auto;
    }

    .nav-left h2 {
      margin-left: 10px;
      font-size: 1.5rem;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 15px;
    }

    .nav-links a {
      color: black;
      text-decoration: none;
      font-size: 1rem;
      padding: 5px 10px;
      transition: background-color 0.3s ease;
    }

    .nav-links a:hover {
      background-color: #444;
      border-radius: 5px;
    }

    .post-btn {
      background-color: #e56b6f;
      padding: 8px 15px;
      border-radius: 5px;
      color: white;
      font-weight: bold;
    }

    .content {
      text-align: center;
      margin: 3rem 0;
      color: #333;
    }

    .content h1 {
      font-size: 2.5rem;
      color: #e56b6f;
      margin-bottom: 20px;
    }

    .content p {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .form-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }

    iframe {
      width: 100%;
      max-width: 640px;
      height: 800px;
      border: none;
    }

    .contact-info {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .contact-info div {
      text-align: center;
      width: 200px;
      margin-bottom: 20px;
    }

    .contact-info i {
      font-size: 2rem;
      color: #e56b6f;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <img src="logo.JPG" alt="Logo" class="nav-logo">
      <h2>Job Portal</h2>
    </div>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="jobs.html">Jobs</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="account.html">Account</a></li>
      <li><a href="postjob.html" class="post-btn">Post Job</a></li>
    </ul>
  </nav>

  <div class="content">
    <h1>Contact Us</h1>
    <p>If you have any questions or feedback, feel free to reach out to us!</p>

    <div class="form-container">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdMU8O0aEZL1bA4YLaxw278JyRjMuVFuqpUxcYJzWg2tl50Bg/viewform?embedded=true" 
              frameborder="0" marginheight="0" marginwidth="0">
        Loading…
      </iframe>
    </div>

    <div class="contact-info">
      <div>
        <i class="fa fa-envelope"></i>
        <p>Email: jobsearchers@gmail.com</p>
      </div>
      <div>
        <i class="fa fa-phone"></i>
        <p>Phone: +91 122334444</p>
      </div>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</body>
</html>
