<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job - Job Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-left">
          <img src="logo.JPG" alt="Logo" class="nav-logo">
          <h2>Job Portal</h2>
        </div>
        <ul class="nav-links">
          <li><a href="home.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="jobs.html">Jobs</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="account.html">Account</a></li>
          <li><a href="postjob.html" class="post-btn">Post Job</a></li>
        </ul>
      </nav>
  <div class="content">
    <h1>Post a New Job</h1>
    <form class="job-form">
      <input type="text" placeholder="Job Title" required>
      <input type="text" placeholder="Company Name" required>
      <input type="text" placeholder="Location" required>
      <textarea rows="5" placeholder="Job Description" required></textarea>
      <button type="submit" class="apply-btn">Post Job</button>
    </form>
  </div>
</body>
</html>
